<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS-Homework-12</title>
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:regular,500,600,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <section class="gallery">
        <div class="container">
          <h1 class="gallery-title">Welcome to Gallery</h1>
          <form class="gallery-form">
            <input
              class="gallery-form-input"
              type="text"
              name="search"
              placeholder="Search images..."
              autofocus
            />
            <button class="gallery-form-btn" type="submit">Search</button>
          </form>

          <ul class="gallery-list"></ul>

          <button class="load-more-btn" type="button">Load more</button>

          <div class="gallery-loader"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
